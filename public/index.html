<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Alus - Elite Monitor</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .box { border: 1px solid #00ff00; padding: 15px; margin-bottom: 10px; background: #111; }
        h1 { border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
        .value { color: #fff; font-weight: bold; }
        
        /* Arama Kutusu Stili */
        #searchPet {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            box-sizing: border-box;
        }
        #pet-listesi {
            max-height: 250px;
            overflow-y: auto;
            background: #050505;
            padding: 5px;
        }
        .pet-item { border-bottom: 1px solid #222; padding: 5px; }
    </style>
</head>
<body>
    <h1>A.L.U.S (Afk Look-Up System)</h1>
    
    <div id="status" class="box">Durum: Veri bekleniyor...</div>
    
    <div class="box">
        <p>Oyuncu: <span id="oyuncu" class="value">-</span></p>
        <p>Elmas: <span id="elmas" class="value">0</span></p>
        <p>Coin: <span id="coin" class="value">0</span></p>
        <p>Güç: <span id="guc" class="value">0</span></p>
    </div>

    <div class="box">
        <h3>Envanter Petleri</h3>
        <input type="text" id="searchPet" placeholder="Pet ismini ara..." onkeyup="filterPets()">
        <div id="pet-listesi">Veri bekleniyor...</div>
    </div>

    <p>Son Güncelleme: <span id="time">-</span></p>
    <p>(Evet bu isim için çok düşündüm)</p>

    <script>
        let currentPetData = {}; // Arama için hafızada tut

        function formatGem(num) {
            if (!num || isNaN(num)) return "0";
            const n = parseFloat(num);
            if (n < 1000) return n;
            const suffixes = [
                { value: 1e24, symbol: "Sp" }, { value: 1e21, symbol: "Sx" },
                { value: 1e18, symbol: "Qi" }, { value: 1e15, symbol: "Qa" },
                { value: 1e12, symbol: "T" }, { value: 1e9, symbol: "B" },
                { value: 1e6, symbol: "M" }, { value: 1e3, symbol: "K" }
            ];
            for (let i = 0; i < suffixes.length; i++) {
                if (n >= suffixes[i].value) return (n / suffixes[i].value).toFixed(2) + suffixes[i].symbol;
            }
            return n;
        }

        function filterPets() {
            const query = document.getElementById('searchPet').value.toLowerCase();
            const container = document.getElementById('pet-listesi');
            let html = "";
            
            for (const [name, count] of Object.entries(currentPetData)) {
                if (name.toLowerCase().includes(query)) {
                    html += `<div class="pet-item">> <span class="value">${name}</span> x${count}</div>`;
                }
            }
            container.innerHTML = html || "Eşleşen pet bulunamadı.";
        }

        async function updateData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                if(data.values) {
                    document.getElementById('status').innerText = "Durum: " + (data.status || "Aktif");
                    document.getElementById('oyuncu').innerText = data.values.oyuncu || "-";
                    document.getElementById('elmas').innerText = formatGem(data.values.elmas);
                    document.getElementById('coin').innerText = data.values.coin || "0";
                    document.getElementById('guc').innerText = data.values.guc || "0";
                    document.getElementById('time').innerText = data.lastUpdate || "-";

                    if (data.pets) {
                        const counts = {};
                        data.pets.forEach(p => counts[p] = (counts[p] || 0) + 1);
                        currentPetData = counts;
                        filterPets(); // Arama varsa bozmadan güncelle
                    }
                }
            } catch (e) { console.error("Hata:", e); }
        }

        setInterval(updateData, 5000);
        updateData();
    </script>
</body>
</html>
