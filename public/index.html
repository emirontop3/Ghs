<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Data Monitor</title>
    <style>
        /* Mevcut Tasarımın */
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        .box { border: 1px solid #00ff00; padding: 15px; margin-bottom: 10px; background: #111; text-align: left; }
        h1 { border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
        .value { color: #fff; font-weight: bold; }
        
        /* Yeni Bildirim Butonu Tasarımı */
        .btn-push {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        .btn-push:hover { background: #00cc00; }
    </style>
</head>
<body>
    <h1>ELITE MONITORING SYSTEM</h1>
    
    <div id="status" class="box">Durum: Veri bekleniyor...</div>
    
    <div class="box">
        <p>Oyuncu: <span id="oyuncu" class="value">-</span></p>
        <p>Elmas: <span id="elmas" class="value">0</span></p>
        <p>Coin: <span id="coin" class="value">0</span></p>
        <p>Güç: <span id="guc" class="value">0</span></p>
    </div>
    
    <div class="box">
        <p>Son Güncelleme: <span id="time">-</span></p>
        <button onclick="startLiveNotifications()" class="btn-push">TELEFONA CANLI BİLDİRİM BAŞLAT</button>
    </div>

    <script>
        // --- 1. VERİ GÜNCELLEME MANTIĞI ---
        async function updateData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                if(data.values) {
                    document.getElementById('status').innerText = "Durum: " + data.status;
                    document.getElementById('oyuncu').innerText = data.values.oyuncu || "-";
                    document.getElementById('elmas').innerText = data.values.elmas || "0";
                    document.getElementById('coin').innerText = data.values.coin || "0";
                    document.getElementById('guc').innerText = data.values.guc || "0";
                    document.getElementById('time').innerText = data.lastUpdate || "-";
                }
            } catch (e) { console.error("Veri çekilemedi"); }
        }

        // --- 2. CANLI BİLDİRİM (PUSH) MANTIĞI ---
        const PUBLIC_VAPID_KEY = 'BJ0W_YjX7X6f5S-v9rP4G3B7XzL9uN6m9_Q5v8j-R4w_K7n8m4v-R4w_K7n8m4v_A'; // Buraya kendi Public Key'ini koy

        async function startLiveNotifications() {
            if (!('serviceWorker' in navigator)) return alert("Tarayıcınız bildirim desteklemiyor.");

            try {
                // Service Worker Kaydı
                const register = await navigator.serviceWorker.register('/sw.js');
                
                // İzin İsteği
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') return alert("Bildirim izni reddedildi!");

                // Telefon Kimliğini (Subscription) Oluştur
                const subscription = await register.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(PUBLIC_VAPID_KEY)
                });

                // Kimliği Sunucuya (Vercel) Gönder
                await fetch('/api/data?action=subscribe', {
                    method: 'POST',
                    body: JSON.stringify(subscription),
                    headers: { 'Content-Type': 'application/json' }
                });

                alert("Canlı takip paneli aktif! Artık bildirim panelinden takip edebilirsiniz.");
            } catch (err) {
                console.error("Hata:", err);
                alert("Bildirim başlatılamadı. HTTPS kullandığınızdan emin olun.");
            }
        }

        // Yardımcı Fonksiyon: Key formatını dönüştürür
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) { outputArray[i] = rawData.charCodeAt(i); }
            return outputArray;
        }

        // Başlangıç Ayarları
        setInterval(updateData, 5000); // 5 saniyede bir ekranı tazele
        updateData();
    </script>
</body>
</html>
