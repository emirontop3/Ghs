<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alus - Elite Data Monitor</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .box { 
            border: 1px solid #00ff00; 
            padding: 15px; 
            margin-bottom: 15px; 
            background: #111; 
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }
        h1 { 
            border-bottom: 2px solid #00ff00; 
            padding-bottom: 10px; 
            text-align: center;
            text-transform: uppercase;
        }
        h3 {
            margin-top: 0;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 5px;
        }
        .value { 
            color: #fff; 
            font-weight: bold; 
        }
        #pet-listesi {
            font-size: 14px;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
            background: #050505;
        }
        .pet-item {
            margin-bottom: 5px;
            border-left: 3px solid #00ff00;
            padding-left: 10px;
        }
        .footer-info {
            font-size: 0.8em;
            color: #888;
            margin-top: 20px;
        }
        /* Kaydırma çubuğu tasarımı */
        #pet-listesi::-webkit-scrollbar { width: 8px; }
        #pet-listesi::-webkit-scrollbar-track { background: #111; }
        #pet-listesi::-webkit-scrollbar-thumb { background: #00ff00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>A.L.U.S (Afk Look-Up System)</h1>
        
        <div id="status" class="box">Durum: Veri bekleniyor...</div>
        
        <div class="box">
            <h3>Karakter İstatistikleri</h3>
            <p>Oyuncu: <span id="oyuncu" class="value">-</span></p>
            <p>Elmas: <span id="elmas" class="value">0</span></p>
            <p>Coin: <span id="coin" class="value">0</span></p>
            <p>Güç: <span id="guc" class="value">0</span></p>
        </div>

        <div class="box">
            <h3>Envanterdeki Petler</h3>
            <div id="pet-listesi">
                Veri bekleniyor...
            </div>
        </div>

        <div class="footer-info">
            <p>Son Güncelleme: <span id="time" class="value">-</span></p>
            <p>(Evet bu isim için çok düşündüm)</p>
        </div>
    </div>

    <script>
        // Sayı formatlayıcı (Milyon, Milyar vb.)
        function formatGem(num) {
            if (!num || isNaN(num)) return "0";
            const n = parseFloat(num);
            if (n < 1000) return n;

            const suffixes = [
                { value: 1e24, symbol: "Sp" },
                { value: 1e21, symbol: "Sx" },
                { value: 1e18, symbol: "Qi" },
                { value: 1e15, symbol: "Qa" },
                { value: 1e12, symbol: "T" },
                { value: 1e9, symbol: "B" },
                { value: 1e6, symbol: "M" },
                { value: 1e3, symbol: "K" }
            ];

            for (let i = 0; i < suffixes.length; i++) {
                if (n >= suffixes[i].value) {
                    return (n / suffixes[i].value).toFixed(2) + suffixes[i].symbol;
                }
            }
            return n;
        }

        async function updateData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                if(data.values) {
                    // Durum ve Temel Bilgiler
                    document.getElementById('status').innerText = "Durum: " + (data.status || "Aktif");
                    document.getElementById('oyuncu').innerText = data.values.oyuncu || "-";
                    document.getElementById('elmas').innerText = formatGem(data.values.elmas);
                    document.getElementById('coin').innerText = data.values.coin || "0";
                    document.getElementById('guc').innerText = data.values.guc || "0";
                    document.getElementById('time').innerText = data.lastUpdate || "-";

                    // Pet Listesi İşleme
                    const petContainer = document.getElementById('pet-listesi');
                    if (data.pets && data.pets.length > 0) {
                        // Petleri sayalım (Örn: 3 tane "Dragon" varsa "Dragon x3" yazsın)
                        const petCounts = {};
                        data.pets.forEach(name => {
                            petCounts[name] = (petCounts[name] || 0) + 1;
                        });

                        let htmlContent = "";
                        for (const [name, count] of Object.entries(petCounts)) {
                            htmlContent += `<div class="pet-item">> <span class="value">${name}</span> <span style="color:#00ff00;">x${count}</span></div>`;
                        }
                        petContainer.innerHTML = htmlContent;
                    } else {
                        petContainer.innerHTML = "Envanter bilgisi yok veya boş.";
                    }
                }
            } catch (e) { 
                console.error("Veri çekme hatası:", e); 
                document.getElementById('status').innerText = "Durum: Bağlantı Hatası!";
            }
        }

        // 5 saniyede bir güncelle
        setInterval(updateData, 5000);
        updateData();
    </script>
</body>
</html>
