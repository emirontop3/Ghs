<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Alus</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .box { border: 1px solid #00ff00; padding: 15px; margin-bottom: 10px; background: #111; }
        h1 { border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
        .value { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>A.L.U.S (Afk Look-Up System)</h1>
    
    <div id="status" class="box">Durum: Veri bekleniyor...</div>
    <div class="box">
        <p>Oyuncu: <span id="oyuncu" class="value">-</span></p>
        <p>Elmas: <span id="elmas" class="value">0</span></p>
        <p>Coin: <span id="coin" class="value">0</span></p>
        <p>Güç: <span id="guc" class="value">0</span></p>
    </div>
    <p>Son Güncelleme: <span id="time">-</span></p>
    <p>(Evet bu isim için çok düşündüm)</p>

    <script>
        // Sadece Elmas (Gem) için kullanılacak formatlayıcı
        function formatGem(num) {
            if (!num || isNaN(num)) return "0";
            const n = parseFloat(num);
            if (n < 1000) return n;

            const suffixes = [
                { value: 1e24, symbol: "Sp" },
                { value: 1e21, symbol: "Sx" },
                { value: 1e18, symbol: "Qi" },
                { value: 1e15, symbol: "Qa" },
                { value: 1e12, symbol: "T" },
                { value: 1e9, symbol: "B" },
                { value: 1e6, symbol: "M" },
                { value: 1e3, symbol: "K" }
            ];

            for (let i = 0; i < suffixes.length; i++) {
                if (n >= suffixes[i].value) {
                    return (n / suffixes[i].value).toFixed(2) + suffixes[i].symbol;
                }
            }
            return n;
        }

        async function updateData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                if(data.values) {
                    document.getElementById('status').innerText = "Durum: " + data.status;
                    document.getElementById('oyuncu').innerText = data.values.oyuncu || "-";
                    
                    // SADECE ELMAS FORMATLANIYOR
                    document.getElementById('elmas').innerText = formatGem(data.values.elmas);
                    
                    // COIN VE GÜÇ OLDUĞU GİBİ KALIYOR
                    document.getElementById('coin').innerText = data.values.coin || "0";
                    document.getElementById('guc').innerText = data.values.guc || "0";
                    
                    document.getElementById('time').innerText = data.lastUpdate || "-";
                }
            } catch (e) { 
                console.error("Veri çekilemedi"); 
            }
        }

        setInterval(updateData, 5000);
        updateData();
    </script>
</body>
</html>
